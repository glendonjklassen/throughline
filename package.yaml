name:                throughline
version:             0.12.0
homepage:            "https://github.com/glendonjklassen/throughline"
license:             MIT
author:              "Glendon Klassen"
maintainer:          "Glendon Klassen"
copyright:           "2026 Glendon Klassen"

extra-source-files:
- README.md

description:         A narrative engine written in Haskell for modeling experience with specificity through composable effects and world state.

# Cabal flag for release builds.  When enabled, compiles out the F3
# debug-cycle key and the learning-mode overlay so a shipped Steam
# bundle doesn't expose dev-only tooling.  Dev builds default to off
# (flag absent) so the F3 tooling is always available locally.
flags:
  release:
    description: Strip debug-only UI (F3 cycle, learning mode overlay).
    default: false
    manual: true

dependencies:
- base >= 4.7 && < 5
- mtl
- transformers
- containers
- aeson
- text
- bytestring
- directory
- filepath
- uuid
- crypton
- memory
- random
- deepseq
- time
- sdl2
- sdl2-ttf

ghc-options:
- -Wall
- -Werror
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints
- -Wno-missing-export-lists

# The full engine source.  Tests, executables, and benchmarks that
# need access to engine internals depend on this library.  Scenario
# authors should depend on the curated `throughline` library below
# instead — its surface is intentionally small.
internal-libraries:
  throughline-internal:
    source-dirs: src
    # When the 'release' flag is on, define RELEASE_BUILD so CPP
    # guards in SDL.Runner (and anywhere else dev-only tooling hides)
    # can branch on it.
    when:
    - condition: flag(release)
      cpp-options: -DRELEASE_BUILD

# The curated public API for scenario authors.  Re-exports the engine
# modules a scenario typically needs and nothing else.  When a real
# scenario reaches for something not exposed here, that's the signal
# to either add a DSL helper or open up the module.
library:
  reexported-modules:
    - GameTypes
    - Engine.Author.Calendar
    - Engine.Author.CommonAxioms
    - Engine.Author.Discovery
    - Engine.Author.DSL
    - Engine.Author.Help
    - Engine.Author.Random
    - Engine.Author.Rumor
    - Engine.Author.Scene
    - Engine.Author.Transition
    - Engine.Core.Conditions
    - Engine.Core.Time
    - Engine.Core.World
    - SDL.Launcher
    - SDL.Layout
    - SDL.Palette
    - SDL.Text
  dependencies:
    - throughline-internal

executables:
  # Multi-scenario dev launcher.  Sees every scenario under app/Scenarios/.
  throughline-exe:
    main:                Main.hs
    source-dirs:
    - app/dev
    - app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - throughline

  # Single-scenario Steam bundle: Deer Hunt only.  Listing the exact
  # scenario modules in other-modules keeps the other scenarios from
  # being linked even though they sit next to DeerHunt under app/.
  deerhunt-exe:
    main:                Main.hs
    source-dirs:
    - app/deerhunt
    - app
    when:
    - condition: true
      other-modules:
      - Scenarios.DeerHunt
      - Scenarios.DeerHunt.Actions
      - Scenarios.DeerHunt.Axioms
      - Scenarios.DeerHunt.Constants
      - Scenarios.DeerHunt.Discoveries
      - Scenarios.DeerHunt.Generation
      - Scenarios.DeerHunt.Help
      - Scenarios.DeerHunt.Lore
      - Scenarios.DeerHunt.Narration
      - Scenarios.DeerHunt.Probability
      - Scenarios.DeerHunt.Rack
      - Scenarios.DeerHunt.Section
      - Scenarios.DeerHunt.Signature
      - Scenarios.DeerHunt.Terrain
      - Scenarios.DeerHunt.World
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - throughline

